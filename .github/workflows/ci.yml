name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ftpclient-tests:
    name: FTPClient package tests
    runs-on: macos-15
    defaults:
      run:
        working-directory: FTPClient
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # Integration tests (SFTPIntegrationTests) auto-skip when no server is
      # reachable, so this also covers them without needing Docker Compose here.
      - run: swift test

  ferri-app-tests:
    name: Ferri app tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: >
          xcodebuild -workspace Ferri.xcworkspace -scheme Ferri test
          -destination 'platform=macOS'
