    <rect x="140" y="400" width="400" height="140" fill="#0B3D73"/>

    <!-- Wave layer 3 — back -->
    <path d="M140 408 Q180 388 220 408 Q260 428 300 408 Q340 388 380 408 Q420 428 460 408 Q500 388 540 405 L540 540 L140 540 Z" fill="#0D4882"/>
    <!-- Wave layer 2 — mid -->
    <path d="M140 426 Q175 404 215 424 Q255 444 295 422 Q335 400 375 422 Q415 444 455 424 Q490 408 540 422 L540 540 L140 540 Z" fill="#0F5496"/>
    <!-- Wave layer 1 — front -->
    <path d="M140 448 Q170 426 205 448 Q240 470 278 446 Q316 422 354 446 Q392 470 430 448 Q465 428 510 446 Q525 452 540 446 L540 540 L140 540 Z" fill="#1560A8"/>

    <!-- Wave crests -->
    <path d="M140 448 Q170 426 205 448 Q240 470 278 446 Q316 422 354 446 Q392 470 430 448 Q465 428 510 446 Q525 452 540 446" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    <path d="M140 426 Q175 404 215 424 Q255 444 295 422 Q335 400 375 422 Q415 444 455 424 Q490 408 540 422" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <path d="M140 408 Q180 388 220 408 Q260 428 300 408 Q340 388 380 408 Q420 428 460 408 Q500 388 540 405" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.18"/>

