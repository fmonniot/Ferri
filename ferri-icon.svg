    <line x1="262" y1="319" x2="418" y2="319" stroke="#9AAFC4" stroke-width="1.5" opacity="0.5"/>

    <!-- Panoramic window strip -->
    <rect x="272" y="324" width="136" height="22" rx="5" fill="#1A6FC4" opacity="0.82"/>
    <rect x="274" y="324" width="132" height="6" rx="3" fill="white" opacity="0.18"/>
    <line x1="318" y1="326" x2="318" y2="344" stroke="white" stroke-width="1" opacity="0.15"/>
    <line x1="340" y1="326" x2="340" y2="344" stroke="white" stroke-width="1" opacity="0.15"/>
    <line x1="362" y1="326" x2="362" y2="344" stroke="white" stroke-width="1" opacity="0.15"/>

    <!-- Funnel -->
    <rect x="322" y="258" width="26" height="36" rx="5" fill="#E2EAF4"/>
    <rect x="318" y="251" width="34" height="10" rx="4" fill="#C8D5E3"/>
    <rect x="322" y="268" width="26" height="8" rx="0" fill="#1A6FC4" opacity="0.45"/>

