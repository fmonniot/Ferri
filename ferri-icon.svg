    <path d="M222 364 Q226 358 234 358 L446 358 Q454 358 458 364 L464 412 L216 412 Z" fill="#E2EAF4"/>
    <line x1="222" y1="364" x2="458" y2="364" stroke="#C8D5E3" stroke-width="1.5"/>

    <!-- 4 windows -->
    <rect x="252" y="377" width="30" height="22" rx="4" fill="#1A6FC4" opacity="0.9"/>
    <rect x="300" y="377" width="30" height="22" rx="4" fill="#1A6FC4" opacity="0.9"/>
    <rect x="348" y="377" width="30" height="22" rx="4" fill="#1A6FC4" opacity="0.9"/>
    <rect x="396" y="377" width="30" height="22" rx="4" fill="#1A6FC4" opacity="0.9"/>
    <rect x="252" y="377" width="9" height="6" rx="2" fill="white" opacity="0.28"/>
    <rect x="300" y="377" width="9" height="6" rx="2" fill="white" opacity="0.28"/>
    <rect x="348" y="377" width="9" height="6" rx="2" fill="white" opacity="0.28"/>
    <rect x="396" y="377" width="9" height="6" rx="2" fill="white" opacity="0.28"/>

    <!-- Cabin -->
    <path d="M272 298 Q276 292 284 292 L396 292 Q404 292 408 298 L416 358 L264 358 Z" fill="#D4E2F0"/>
    <line x1="264" y1="358" x2="416" y2="358" stroke="#BDD0E4" stroke-width="1.5"/>

