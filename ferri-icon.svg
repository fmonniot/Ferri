  </defs>

  <rect x="140" y="140" width="400" height="400" rx="90" fill="#1A6FC4"/>

  <g clip-path="url(#iconClip)">

    <!-- Sky -->
    <rect x="140" y="140" width="400" height="280" fill="#1A6FC4"/>

